name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run tests
        run: npm test || true

      - name: Build package
        run: npm run build

      - name: Semantic Release (GitHub only)
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}